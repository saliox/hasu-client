# Build d'Azur Client à chaque push/PR, et release GitHub automatique quand un
# commit « [create release] … » arrive sur la branche stable (ou à la demande via
# Run workflow). Actions modernisées (les artefacts v2 et ::set-output utilisés par
# Sol Client ont été désactivés par GitHub).
name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Git checkout
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    - name: Build
      run: ./gradlew --no-daemon dist

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wrapper
        path: build/libs/*.jar

    - name: Upload dist
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: build/dist/*

  upload:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.ref == 'refs/heads/stable' && startsWith(github.event.head_commit.message, '[create release] '))

    runs-on: ubuntu-latest

    needs: build

    permissions:
      contents: write

    steps:
    - name: Git checkout
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Retrieve version
      run: echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
      id: version

    - name: Create a release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Azur Client ${{ steps.version.outputs.version }}
        files: |
          wrapper/*
          dist/*
