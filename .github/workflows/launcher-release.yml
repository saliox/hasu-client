# Build & publication du Hasu Launcher (launcher/) SANS PC Windows : ce workflow
# tourne sur un runner windows-latest, construit l'installeur NSIS + la version
# portable via electron-builder, publie la Release GitHub (tag launcher-v<version>)
# et met à jour launcher/version.json pour armer l'auto-update.
#
# Déclenchement MANUEL uniquement (onglet Actions -> "Hasu Launcher — build & release"
# -> Run workflow). Isolé : n'affecte jamais les releases de Cap Hub (tags cap-hub-v*).
name: Hasu Launcher — build & release

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Notes de version (facultatif)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: launcher-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: launcher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        run: npm install --no-audit --no-fund

      - name: (Re)générer les icônes
        run: npm run icon

      - name: Tests
        run: npm test

      - name: Construire l'installeur (NSIS + portable)
        run: npm run dist

      - name: Publier la Release + mettre à jour version.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-update.mjs "${{ github.event.inputs.notes }}"

      - name: Publier l'installeur comme artefact du workflow
        uses: actions/upload-artifact@v4
        with:
          name: launcher-installer
          path: launcher/dist/*.exe
          if-no-files-found: error

      # Le SHA-256 n'est connu qu'après le build : on doit donc pousser version.json
      # APRÈS coup. Comme main est partagé avec d'autres projets, un merge concurrent
      # peut faire échouer le push (non-fast-forward). On resynchronise donc sur le
      # dernier main et on réessaie, au lieu d'un simple push qui casse à la moindre course
      # (même correctif que Cap Hub).
      - name: Recommiter version.json (auto-update, résilient aux merges concurrents)
        working-directory: .
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          branch='${{ github.ref_name }}'
          # version.json fraîchement générée (contient le SHA-256 du build de CE run).
          cp launcher/version.json "$RUNNER_TEMP/version.json"
          ok=0
          for i in 1 2 3 4 5; do
            git fetch origin "$branch"
            git reset --hard "origin/$branch"          # rebase le seul changement sur le dernier main (dist/ et node_modules/ sont ignorés, préservés)
            cp "$RUNNER_TEMP/version.json" launcher/version.json
            git add launcher/version.json
            if git diff --cached --quiet; then echo "version.json déjà à jour."; ok=1; break; fi
            git commit -m 'chore(launcher): update version.json for release [skip ci]'
            if git push origin "HEAD:$branch"; then ok=1; break; fi
            echo "Push rejeté (merge concurrent sur $branch) — nouvelle tentative $i/5…"
            sleep $((i * 3))
          done
          if [ "$ok" != "1" ]; then
            echo "::error::version.json n'a pas pu être mis à jour après 5 tentatives (course persistante sur $branch)."
            exit 1
          fi
