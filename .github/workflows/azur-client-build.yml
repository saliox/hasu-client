# Compile Azur Client (azur-client/) sur les runners GitHub — la sandbox de dev n'a
# pas accès aux mavens de modding, la CI est donc le seul endroit où vérifier le
# build tant que le dépôt dédié saliox/azur-client n'existe pas. À supprimer de
# hasu-client lors de la promotion vers le dépôt dédié (sa propre CI prendra le relais).
name: Azur Client — build

on:
  push:
    paths:
      - "azur-client/**"
      - ".github/workflows/azur-client-build.yml"
  workflow_dispatch:

concurrency:
  group: azur-client-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: azur-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            azur-client/**/*.gradle*
            azur-client/gradle/wrapper/gradle-wrapper.properties

      - name: Build (dist)
        run: ./gradlew --no-daemon dist

      - name: Upload wrapper jar
        uses: actions/upload-artifact@v4
        with:
          name: azur-client-wrapper
          path: azur-client/build/libs/*.jar

      - name: Upload dist (packs launcher)
        uses: actions/upload-artifact@v4
        with:
          name: azur-client-dist
          path: azur-client/build/dist/*
