# Publication d'une release d'Azur Client (azur-client/) : build complet, release
# GitHub taguée azur-client-v<version> (version lue dans azur-client/version.txt)
# avec les packs Prism/Mojang + le wrapper jar, puis mise à jour du manifeste
# azur-client/release.json qui arme la notification de mise à jour en jeu.
#
# Déclenchement MANUEL uniquement (onglet Actions -> "Azur Client — release" ->
# Run workflow). Isolé des releases Cap Hub (cap-hub-v*) et launcher (launcher-v*).
name: Azur Client — release

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Notes de version (facultatif)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: azur-client-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: azur-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            azur-client/**/*.gradle*
            azur-client/gradle/wrapper/gradle-wrapper.properties

      - name: Build (dist)
        run: ./gradlew --no-daemon dist

      - name: Version
        id: version
        run: echo "version=$(head -n1 version.txt)" >> "$GITHUB_OUTPUT"

      - name: Créer la release GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ github.event.inputs.notes }}
        run: |
          tag="azur-client-v${{ steps.version.outputs.version }}"
          title="Azur Client ${{ steps.version.outputs.version }}"
          notes="${NOTES:-$title}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" build/dist/* build/libs/*.jar --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" build/dist/* build/libs/*.jar \
              --repo "$GITHUB_REPOSITORY" --title "$title" --notes "$notes"
          fi

      - name: Armer l'auto-notification (release.json)
        run: |
          printf '{\n  "name": "%s"\n}\n' "${{ steps.version.outputs.version }}" > release.json
          cd ..
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add azur-client/release.json
          if ! git diff --cached --quiet; then
            git commit -m 'chore(azur-client): update release.json for release [skip ci]'
            git push origin HEAD:${{ github.ref_name }}
          fi
