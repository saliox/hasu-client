# Normalise les manifestes de mise a jour (version.json / version-beta.json) en
# retirant tout BOM UTF-8 (EF BB BF) qu'un pipeline de publication externe
# (PowerShell ConvertTo-Json / Out-File sous Windows) reintroduit a chaque release.
# Un BOM fait echouer un JSON.parse brut cote launcher -> les MAJ passent inapercues.
# Ce workflow rend le correctif DURABLE : il s'execute a chaque push touchant ces
# fichiers, retire le BOM sur place (sans reformater le contenu) et recommite si besoin.
name: Normalize JSON (strip BOM)

on:
  push:
    branches: [main, master]
    paths:
      - "**/version.json"
      - "**/version-beta.json"

permissions:
  contents: write

concurrency:
  group: normalize-bom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  strip-bom:
    # Ne pas boucler sur nos propres commits de normalisation.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Strip UTF-8 BOM from update manifests
        shell: bash
        run: |
          shopt -s globstar nullglob
          changed=0
          for f in **/version.json **/version-beta.json; do
            [ -f "$f" ] || continue
            if [ "$(head -c3 "$f" | od -An -tx1 | tr -d ' \n')" = "efbbbf" ]; then
              tail -c +4 "$f" > "$f.nobom" && mv "$f.nobom" "$f"
              echo "stripped BOM: $f"
              changed=1
            fi
          done
          echo "changed=$changed" >> "$GITHUB_ENV"

      # Ce workflow se déclenche sur les mêmes fichiers (version.json) que les workflows
      # de release, qui recommitent aussi sur cette branche : un push concurrent peut
      # faire échouer un simple `git push` (non-fast-forward). On resynchronise donc sur
      # le dernier ref et on réessaie (même correctif que les workflows de release).
      - name: Commit normalized files
        if: env.changed == '1'
        shell: bash
        run: |
          shopt -s globstar nullglob
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          branch='${{ github.ref_name }}'
          mkdir -p "$RUNNER_TEMP/bom-fix"
          for f in **/version.json **/version-beta.json; do
            [ -f "$f" ] || continue
            mkdir -p "$RUNNER_TEMP/bom-fix/$(dirname "$f")"
            cp "$f" "$RUNNER_TEMP/bom-fix/$f"
          done
          ok=0
          for i in 1 2 3 4 5; do
            git fetch origin "$branch"
            git reset --hard "origin/$branch"
            for f in **/version.json **/version-beta.json; do
              [ -f "$RUNNER_TEMP/bom-fix/$f" ] || continue
              cp "$RUNNER_TEMP/bom-fix/$f" "$f"
            done
            git add -A
            if git diff --cached --quiet; then echo "déjà normalisé."; ok=1; break; fi
            git commit -m 'chore: strip UTF-8 BOM from update manifests [skip ci]'
            if git push origin "HEAD:$branch"; then ok=1; break; fi
            echo "Push rejeté (merge concurrent sur $branch) — nouvelle tentative $i/5…"
            sleep $((i * 3))
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Impossible de pousser la normalisation BOM après 5 tentatives (course persistante sur $branch)."
            exit 1
          fi
